name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create/publish, for example v0.3.0"
        required: true
        type: string
      draft:
        description: "Create as draft release"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: false
        type: boolean
      make_latest:
        description: "Mark this release as latest"
        required: true
        default: true
        type: boolean
      release_notes:
        description: "Optional release notes"
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  windows:
    name: Windows (NSIS)
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            notification-overlay/src-tauri/target
          key: ${{ runner.os }}-void-toast-cargo-${{ hashFiles('notification-overlay/src-tauri/Cargo.lock') }}
      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            %LOCALAPPDATA%\\electron\\Cache
            %LOCALAPPDATA%\\electron-builder\\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
      - run: npm ci
      - run: npm run dist:win
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          if-no-files-found: error

  linux:
    name: Linux (AppImage + deb + rpm)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            notification-overlay/src-tauri/target
          key: ${{ runner.os }}-void-toast-cargo-${{ hashFiles('notification-overlay/src-tauri/Cargo.lock') }}
      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - name: Build bundled torrent-agent binary
        run: npm run bundle:torrent-agent
      - name: Build Linux artifacts
        run: |
          npm run build:notification-overlay:linux
          node scripts/patch-electron-builder.js
          npm run build
          npx electron-builder --linux appimage deb rpm --publish never
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.yml
            release/*.blockmap
          if-no-files-found: error

  pacman:
    name: Arch Linux (pacman)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps (pacman)
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed git base-devel python rust libarchive libxcrypt-compat webkit2gtk-4.1 gtk3 libayatana-appindicator librsvg
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Verify Node runtime
        run: |
          node -v
          npm -v
      - run: npm ci
      - name: Build bundled torrent-agent binary
        run: npm run bundle:torrent-agent
      - name: Build pacman package
        run: |
          npm run build:notification-overlay:linux
          node scripts/patch-electron-builder.js
          npm run build
          npx electron-builder --linux pacman --publish never
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pacman
          path: |
            release/*.pacman
            release/*.pkg.tar.*
            release/*.yml
            release/*.blockmap
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [windows, linux, pacman]
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release options
        id: release_options
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          INPUT_DRAFT: ${{ github.event.inputs.draft }}
          INPUT_PRERELEASE: ${{ github.event.inputs.prerelease }}
          INPUT_MAKE_LATEST: ${{ github.event.inputs.make_latest }}
          INPUT_RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="$INPUT_RELEASE_TAG"
          else
            tag="$GITHUB_REF_NAME"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){1,2}([-.][A-Za-z0-9._-]+)?$ ]]; then
            echo "Release tag must look like v0.3.0 or v0.3.0-beta.1"; exit 1
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            draft="$INPUT_DRAFT"
            prerelease="$INPUT_PRERELEASE"
            make_latest="$INPUT_MAKE_LATEST"
            notes="$INPUT_RELEASE_NOTES"
          else
            draft="true"
            prerelease="false"
            make_latest="true"
            notes=""
          fi

          latest_flag="--latest=false"
          if [ "$make_latest" = "true" ]; then
            latest_flag="--latest"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "latest_flag=$latest_flag" >> "$GITHUB_OUTPUT"
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          tag="${{ steps.release_options.outputs.tag }}"
          if gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release $tag already exists"
          fi
          if git ls-remote --tags origin "refs/tags/$tag" | grep -q "$tag"; then
            echo "Tag $tag already exists"
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/$tag" \
              -f sha="${GITHUB_SHA}"
          fi

      - name: Create release (idempotent)
        shell: bash
        env:
          RELEASE_NOTES: ${{ steps.release_options.outputs.notes }}
        run: |
          tag="${{ steps.release_options.outputs.tag }}"
          notes="$RELEASE_NOTES"

          args=()
          if [ "${{ steps.release_options.outputs.draft }}" = "true" ]; then
            args+=(--draft)
          fi
          if [ "${{ steps.release_options.outputs.prerelease }}" = "true" ]; then
            args+=(--prerelease)
          fi
          if [ -n "$notes" ]; then
            args+=(--notes "$notes")
          else
            args+=(--generate-notes)
          fi

          gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
          gh release create "$tag" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "$tag" \
            --target "${GITHUB_SHA}" \
            "${args[@]}" || true

      - name: Upload assets
        shell: bash
        run: |
          shopt -s globstar nullglob
          declare -A seen
          files=()
          for f in artifacts/**/*; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            case "$base" in
              builder-debug.yml|builder-effective-config.yaml) continue ;;
            esac
            if [[ -z "${seen[$base]}" ]]; then
              seen[$base]=1
              files+=("$f")
            fi
          done
          if [ ${#files[@]} -eq 0 ]; then
            echo "No artifacts downloaded"; exit 1
          fi
          gh release upload "${{ steps.release_options.outputs.tag }}" "${files[@]}" --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Apply final release flags
        shell: bash
        run: |
          args=()
          if [ "${{ steps.release_options.outputs.draft }}" = "true" ]; then
            args+=(--draft=true)
          else
            args+=(--draft=false)
          fi
          if [ "${{ steps.release_options.outputs.prerelease }}" = "true" ]; then
            args+=(--prerelease=true)
          else
            args+=(--prerelease=false)
          fi
          args+=("${{ steps.release_options.outputs.latest_flag }}")

          gh release edit "${{ steps.release_options.outputs.tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            "${args[@]}"
